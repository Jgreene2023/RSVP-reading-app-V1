<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FlowRead</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a35;
      --accent: #e8c97e;
      --accent2: #7eb8e8;
      --text: #e8e6e0;
      --text-dim: #7a7875;
      --text-mid: #b0ada6;
      --danger: #e87e7e;
      --radius: 12px;
      --rsvp-size: clamp(2rem, 8vw, 3.5rem);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── SCREENS ── */
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity 0.3s, transform 0.3s; }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

    /* ── HOME ── */
    #home {
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      background: radial-gradient(ellipse at 60% 20%, #1a1a2e 0%, var(--bg) 60%);
    }

    .logo {
      text-align: center;
    }
    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      letter-spacing: -0.02em;
      color: var(--accent);
      line-height: 1;
    }
    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .drop-zone {
      width: 100%;
      max-width: 340px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232,201,126,0.05);
    }
    .drop-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .drop-title { font-size: 1rem; color: var(--text); margin-bottom: 0.3rem; }
    .drop-hint { font-size: 0.8rem; color: var(--text-dim); font-family: 'DM Mono', monospace; }

    #fileInput { display: none; }

    .library { width: 100%; max-width: 340px; }
    .library-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }
    .book-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 200px; overflow-y: auto; }
    .book-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .book-item:active { background: var(--surface2); border-color: var(--border); }
    .book-icon { font-size: 1.2rem; flex-shrink: 0; }
    .book-name { font-size: 0.85rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .book-del { font-size: 1rem; color: var(--text-dim); padding: 0.2rem 0.4rem; }

    /* ── READER ── */
    #reader {
      display: flex;
      flex-direction: column;
    }

    .reader-topbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-icon:active { background: var(--border); }
    .btn-icon.active { background: var(--accent); color: var(--bg); }

    .book-title-bar {
      flex: 1;
      font-size: 0.8rem;
      color: var(--text-mid);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── RSVP MODE ── */
    #rsvpMode {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      gap: 1rem;
      overflow: hidden;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.1s;
    }

    .rsvp-context {
      width: 100%;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      min-height: 1.2em;
      line-height: 1.5;
      padding: 0 1rem;
    }

    .rsvp-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .rsvp-word-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Pivot letter highlight */
    .rsvp-word {
      font-family: 'Playfair Display', serif;
      font-size: var(--rsvp-size);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      text-align: center;
      line-height: 1.1;
      transition: opacity 0.05s;
    }
    .rsvp-word .pivot { color: var(--accent); }

    .rsvp-word.flash { animation: wordFlash 0.08s ease-out; }
    @keyframes wordFlash {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .rsvp-controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .speed-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 60px;
    }
    .speed-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      min-width: 52px;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    .hold-btn {
      width: 100%;
      height: 72px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #252530, #1c1c28);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      touch-action: none;
    }
    .hold-btn.pressing {
      background: linear-gradient(135deg, #2a2a1e, #1e2218);
      border-color: var(--accent);
      transform: scale(0.98);
    }
    .hold-btn-icon { font-size: 1.4rem; }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .status-pill.running { background: rgba(232,201,126,0.15); color: var(--accent); }

    /* ── PROSE MODE ── */
    #proseMode {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem;
      -webkit-overflow-scrolling: touch;
    }

    #proseContent {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--text-mid);
      max-width: 640px;
      margin: 0 auto;
    }
    #proseContent p { margin-bottom: 1.2em; }
    #proseContent h1, #proseContent h2, #proseContent h3 {
      font-family: 'Playfair Display', serif;
      color: var(--text);
      margin-bottom: 0.8em;
      margin-top: 1.5em;
    }
    #proseContent h1 { font-size: 1.6rem; }
    #proseContent h2 { font-size: 1.3rem; }
    #proseContent h3 { font-size: 1.1rem; }

    .current-word-highlight {
      background: rgba(232,201,126,0.25);
      border-radius: 3px;
      color: var(--accent);
    }

    /* ── LOADING ── */
    #loading {
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ── CHAPTER NAV ── */
    .chapter-drawer {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .chapter-drawer.open { opacity: 1; pointer-events: all; }
    .chapter-sheet {
      width: 100%;
      background: var(--surface);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 1.25rem;
      max-height: 60vh;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transform: translateY(100%);
      transition: transform 0.25s;
    }
    .chapter-drawer.open .chapter-sheet { transform: translateY(0); }
    .chapter-sheet-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .chapter-list { overflow-y: auto; display: flex; flex-direction: column; gap: 0.4rem; }
    .chapter-item {
      padding: 0.7rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-mid);
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .chapter-item:active, .chapter-item.active { background: var(--surface2); border-color: var(--border); color: var(--text); }
  </style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="logo">
    <div class="logo-title">FlowRead</div>
    <div class="logo-sub">RSVP · epub reader</div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📖</div>
    <div class="drop-title">Open an EPUB</div>
    <div class="drop-hint">tap to browse · or drag & drop</div>
  </div>
  <input type="file" id="fileInput" accept=".epub" />

  <div class="library" id="library" style="display:none">
    <div class="library-title">Recent Books</div>
    <div class="book-list" id="bookList"></div>
  </div>
</div>

<!-- LOADING -->
<div class="screen hidden" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Parsing epub…</div>
</div>

<!-- READER -->
<div class="screen hidden" id="reader">
  <div class="reader-topbar">
    <button class="btn-icon" id="backBtn" title="Home">←</button>
    <div class="book-title-bar" id="bookTitleBar">—</div>
    <button class="btn-icon" id="chapBtn" title="Chapters">☰</button>
    <button class="btn-icon active" id="modeBtn" title="Switch mode">⚡</button>
  </div>

  <!-- RSVP -->
  <div id="rsvpMode">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="rsvp-context" id="rsvpContext">—</div>

    <div class="rsvp-stage">
      <div class="rsvp-word-wrap">
        <div class="rsvp-word" id="rsvpWord">open a book</div>
      </div>
    </div>

    <div class="rsvp-controls">
      <div class="speed-row">
        <span class="speed-label">Speed</span>
        <input type="range" id="speedSlider" min="60" max="900" step="10" value="300" />
        <span class="speed-val" id="speedVal">300 wpm</span>
      </div>

      <div class="status-row">
        <span class="status-pill" id="statusPill">paused</span>
        <span class="status-pill" id="positionPill">0 / 0</span>
      </div>

      <button class="hold-btn" id="holdBtn" touch-action="none">
        <span class="hold-btn-icon">👁</span>
        <span>Hold to Read</span>
      </button>
    </div>
  </div>

  <!-- PROSE -->
  <div id="proseMode" style="display:none">
    <div id="proseContent"></div>
  </div>

  <!-- Chapter drawer -->
  <div class="chapter-drawer" id="chapDrawer">
    <div class="chapter-sheet">
      <div class="chapter-sheet-title">Chapters</div>
      <div class="chapter-list" id="chapterList"></div>
    </div>
  </div>
</div>

<!-- epub.js via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<script>
// ─── STATE ────────────────────────────────────────────────
const state = {
  book: null,
  chapters: [],          // { title, href }
  currentChapter: 0,
  words: [],             // flat word array for current chapter
  wordIndex: 0,
  wpm: 300,
  running: false,
  rsvpTimer: null,
  mode: 'rsvp',          // 'rsvp' | 'prose'
  bookName: '',
  library: []
};

// ─── UTILS ────────────────────────────────────────────────
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function $(id) { return document.getElementById(id); }

function pivotIndex(word) {
  const l = word.length;
  if (l <= 1) return 0;
  if (l <= 5) return 1;
  if (l <= 9) return 2;
  return 3;
}

function renderRSVPWord(word) {
  const el = $('rsvpWord');
  const p = pivotIndex(word);
  const before = word.slice(0, p);
  const pivot  = word[p] || '';
  const after  = word.slice(p + 1);
  el.innerHTML = `${escHtml(before)}<span class="pivot">${escHtml(pivot)}</span>${escHtml(after)}`;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // preserve paragraph breaks
  tmp.querySelectorAll('p,br,div,h1,h2,h3,h4,h5,h6').forEach(el => {
    el.insertAdjacentText('beforebegin', ' ');
    el.insertAdjacentText('afterend', ' ');
  });
  return tmp.textContent || tmp.innerText || '';
}

function tokenize(text) {
  return text.split(/\s+/).map(w => w.trim()).filter(w => w.length > 0);
}

function updateProgress() {
  const pct = state.words.length ? (state.wordIndex / state.words.length) * 100 : 0;
  $('progressFill').style.width = pct + '%';
  $('positionPill').textContent = `${state.wordIndex} / ${state.words.length}`;
}

function updateContext() {
  const wi = state.wordIndex;
  const words = state.words;
  const before = words.slice(Math.max(0, wi - 4), wi).join(' ');
  const after  = words.slice(wi + 1, wi + 5).join(' ');
  $('rsvpContext').textContent = (before ? '… ' + before + ' ' : '') + '[ ] ' + (after ? after + ' …' : '');
}

// ─── LIBRARY (localStorage) ───────────────────────────────
function loadLibrary() {
  try { state.library = JSON.parse(localStorage.getItem('flowread_lib') || '[]'); } catch(e) { state.library = []; }
}
function saveLibrary() {
  try { localStorage.setItem('flowread_lib', JSON.stringify(state.library)); } catch(e) {}
}
function saveBookProgress() {
  if (!state.bookName) return;
  const key = 'flowread_pos_' + state.bookName;
  try { localStorage.setItem(key, JSON.stringify({ ch: state.currentChapter, wi: state.wordIndex })); } catch(e) {}
}
function loadBookProgress() {
  const key = 'flowread_pos_' + state.bookName;
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

function renderLibrary() {
  loadLibrary();
  if (state.library.length === 0) { $('library').style.display = 'none'; return; }
  $('library').style.display = 'block';
  const list = $('bookList');
  list.innerHTML = '';
  state.library.forEach((name, i) => {
    const item = document.createElement('div');
    item.className = 'book-item';
    item.innerHTML = `<span class="book-icon">📕</span><span class="book-name">${escHtml(name)}</span><span class="book-del" data-idx="${i}">✕</span>`;
    item.addEventListener('click', (e) => {
      if (e.target.dataset.idx !== undefined) {
        state.library.splice(parseInt(e.target.dataset.idx), 1);
        // also remove stored epub blob
        try { localStorage.removeItem('flowread_epub_' + name); } catch(e) {}
        saveLibrary(); renderLibrary(); return;
      }
      const epubData = localStorage.getItem('flowread_epub_' + name);
      if (epubData) {
        state.bookName = name;
        loadEpubFromBase64(epubData);
      }
    });
    list.appendChild(item);
  });
}

// ─── EPUB LOADING ─────────────────────────────────────────
$('dropZone').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadEpubFile(file);
});

$('dropZone').addEventListener('dragover', e => { e.preventDefault(); $('dropZone').classList.add('drag-over'); });
$('dropZone').addEventListener('dragleave', () => $('dropZone').classList.remove('drag-over'));
$('dropZone').addEventListener('drop', e => {
  e.preventDefault();
  $('dropZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.epub')) loadEpubFile(file);
});

function loadEpubFile(file) {
  state.bookName = file.name.replace(/\.epub$/i, '');
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = btoa(String.fromCharCode(...new Uint8Array(e.target.result)));
    // save to localStorage for library
    try {
      localStorage.setItem('flowread_epub_' + state.bookName, base64);
      if (!state.library.includes(state.bookName)) {
        state.library.unshift(state.bookName);
        if (state.library.length > 10) state.library.pop();
        saveLibrary();
      }
    } catch(ex) { /* storage full – just proceed */ }
    await openEpubFromArrayBuffer(e.target.result);
  };
  reader.readAsArrayBuffer(file);
}

async function loadEpubFromBase64(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const arr = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  await openEpubFromArrayBuffer(buf);
}

async function openEpubFromArrayBuffer(buf) {
  hide('home');
  show('loading');
  try {
    state.book = ePub(buf);
    await state.book.ready;
    await state.book.locations.generate(1000);

    const toc = await state.book.loaded.navigation;
    state.chapters = [];
    const flatten = (items) => items.forEach(item => {
      state.chapters.push({ title: item.label.trim(), href: item.href });
      if (item.subitems && item.subitems.length) flatten(item.subitems);
    });
    if (toc && toc.toc) flatten(toc.toc);

    if (state.chapters.length === 0) {
      // fallback: use spine
      state.book.spine.each(item => state.chapters.push({ title: item.idref, href: item.href }));
    }

    $('bookTitleBar').textContent = state.bookName;

    // restore progress or start from beginning
    const prog = loadBookProgress();
    state.currentChapter = prog ? prog.ch : 0;
    state.wordIndex = prog ? prog.wi : 0;

    await loadChapter(state.currentChapter);
    renderChapterList();

    hide('loading');
    show('reader');
  } catch(err) {
    hide('loading');
    show('home');
    alert('Failed to parse epub: ' + err.message);
  }
}

async function loadChapter(idx) {
  if (!state.chapters[idx]) return;
  state.currentChapter = idx;
  const chap = state.chapters[idx];

  const section = await state.book.spine.get(chap.href) || await state.book.spine.get(idx);
  let htmlContent = '';
  try {
    const contents = await state.book.load(chap.href);
    htmlContent = (new XMLSerializer()).serializeToString(contents);
  } catch(e) {
    // try spine
    try {
      const spineItem = state.book.spine.spineItems[idx];
      if (spineItem) {
        await spineItem.load(state.book.load.bind(state.book));
        htmlContent = spineItem.document ? (new XMLSerializer()).serializeToString(spineItem.document) : '';
      }
    } catch(e2) { htmlContent = '<p>Could not load chapter.</p>'; }
  }

  const plain = stripHtml(htmlContent);
  state.words = tokenize(plain);
  if (state.wordIndex >= state.words.length) state.wordIndex = 0;

  // Prose HTML
  $('proseContent').innerHTML = sanitizeHtml(htmlContent);

  updateProgress();
  if (state.words[state.wordIndex]) renderRSVPWord(state.words[state.wordIndex]);
  updateContext();
  updateChapterActive();
}

function sanitizeHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // remove scripts, styles
  tmp.querySelectorAll('script,style,link,meta').forEach(el => el.remove());
  // strip all attributes except alt
  tmp.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(attr => {
      if (!['alt','href'].includes(attr.name)) el.removeAttribute(attr.name);
    });
  });
  return tmp.innerHTML;
}

// ─── CHAPTER LIST ─────────────────────────────────────────
function renderChapterList() {
  const list = $('chapterList');
  list.innerHTML = '';
  state.chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    item.dataset.idx = i;
    item.textContent = ch.title || ('Chapter ' + (i + 1));
    item.addEventListener('click', async () => {
      state.wordIndex = 0;
      await loadChapter(i);
      closeChapDrawer();
    });
    list.appendChild(item);
  });
}
function updateChapterActive() {
  $('chapterList').querySelectorAll('.chapter-item').forEach((el, i) => {
    el.classList.toggle('active', i === state.currentChapter);
  });
}

$('chapBtn').addEventListener('click', () => {
  const drawer = $('chapDrawer');
  drawer.classList.toggle('open');
});
$('chapDrawer').addEventListener('click', (e) => {
  if (e.target === $('chapDrawer')) closeChapDrawer();
});
function closeChapDrawer() { $('chapDrawer').classList.remove('open'); }

// ─── MODE TOGGLE ──────────────────────────────────────────
$('modeBtn').addEventListener('click', () => {
  stopRSVP();
  if (state.mode === 'rsvp') {
    state.mode = 'prose';
    $('rsvpMode').style.display = 'none';
    $('proseMode').style.display = 'block';
    $('modeBtn').textContent = '⚡';
    $('modeBtn').classList.remove('active');
    $('modeBtn').title = 'RSVP mode';
    scrollToCurrentWord();
  } else {
    state.mode = 'rsvp';
    $('proseMode').style.display = 'none';
    $('rsvpMode').style.display = 'flex';
    $('modeBtn').textContent = '📖';
    $('modeBtn').classList.add('active');
    $('modeBtn').title = 'Reader mode';
  }
});

function scrollToCurrentWord() {
  // highlight current word in prose
  const content = $('proseContent');
  const plain = content.textContent;
  // simple: just scroll to top for now (full highlight would need tokenization mapping)
}

// ─── RSVP ENGINE ──────────────────────────────────────────
function startRSVP() {
  if (state.running || state.words.length === 0) return;
  state.running = true;
  $('statusPill').textContent = 'reading';
  $('statusPill').classList.add('running');
  $('holdBtn').classList.add('pressing');
  tick();
}

function stopRSVP() {
  if (!state.running) return;
  state.running = false;
  clearTimeout(state.rsvpTimer);
  $('statusPill').textContent = 'paused';
  $('statusPill').classList.remove('running');
  $('holdBtn').classList.remove('pressing');
  saveBookProgress();
}

async function tick() {
  if (!state.running) return;
  const word = state.words[state.wordIndex];
  if (!word) {
    // end of chapter — try next
    if (state.currentChapter + 1 < state.chapters.length) {
      state.wordIndex = 0;
      await loadChapter(state.currentChapter + 1);
    } else {
      stopRSVP();
      renderRSVPWord('🎉');
      $('rsvpContext').textContent = 'End of book';
    }
    return;
  }

  renderRSVPWord(word);
  updateContext();
  state.wordIndex++;
  updateProgress();

  // adaptive delay: longer words get slightly more time
  const base = 60000 / state.wpm;
  const extra = word.length > 8 ? base * 0.3 : 0;
  const punctPause = /[.!?;:]$/.test(word) ? base * 0.6 : 0;
  const delay = base + extra + punctPause;

  state.rsvpTimer = setTimeout(tick, delay);
}

// ─── SPEED CONTROL ────────────────────────────────────────
$('speedSlider').addEventListener('input', e => {
  state.wpm = parseInt(e.target.value);
  $('speedVal').textContent = state.wpm + ' wpm';
});

// ─── HOLD BUTTON ──────────────────────────────────────────
const holdBtn = $('holdBtn');

function onHoldStart(e) {
  e.preventDefault();
  startRSVP();
}
function onHoldEnd(e) {
  e.preventDefault();
  stopRSVP();
}

holdBtn.addEventListener('touchstart', onHoldStart, { passive: false });
holdBtn.addEventListener('touchend', onHoldEnd, { passive: false });
holdBtn.addEventListener('touchcancel', onHoldEnd, { passive: false });
holdBtn.addEventListener('mousedown', onHoldStart);
holdBtn.addEventListener('mouseup', onHoldEnd);
holdBtn.addEventListener('mouseleave', onHoldEnd);

// ─── BACK ─────────────────────────────────────────────────
$('backBtn').addEventListener('click', () => {
  stopRSVP();
  saveBookProgress();
  hide('reader');
  show('home');
  renderLibrary();
  // reset mode UI
  state.mode = 'rsvp';
  $('proseMode').style.display = 'none';
  $('rsvpMode').style.display = 'flex';
  $('modeBtn').textContent = '⚡';
  $('modeBtn').classList.add('active');
});

// ─── INIT ─────────────────────────────────────────────────
renderLibrary();

// Service worker registration for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
