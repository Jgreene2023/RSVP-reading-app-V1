<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FlowRead</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #141418; --surface2: #1c1c22;
      --border: #2a2a35; --accent: #e8c97e; --accent2: #7eb8e8;
      --text: #e8e6e0; --text-dim: #7a7875; --text-mid: #b0ada6;
      --radius: 12px; --rsvp-size: clamp(2rem, 8vw, 3.5rem);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }

    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity 0.25s, transform 0.25s; }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

    /* HOME */
    #home { align-items: center; justify-content: center; gap: 1.5rem; padding: 2rem; background: radial-gradient(ellipse at 60% 20%, #1a1a2e 0%, var(--bg) 60%); }
    .logo-title { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--accent); text-align: center; }
    .logo-sub { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; text-align: center; margin-top: 0.3rem; }
    .drop-zone { width: 100%; max-width: 340px; border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: var(--surface); transition: border-color 0.2s, background 0.2s; }
    .drop-zone.drag-over { border-color: var(--accent); background: rgba(232,201,126,0.06); }
    .drop-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
    .drop-title { font-size: 1rem; margin-bottom: 0.3rem; }
    .drop-hint { font-size: 0.78rem; color: var(--text-dim); font-family: 'DM Mono', monospace; }
    #fileInput { display: none; }
    .library { width: 100%; max-width: 340px; }
    .library-title { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.6rem; }
    .book-list { display: flex; flex-direction: column; gap: 0.4rem; max-height: 220px; overflow-y: auto; }
    .book-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1rem; background: var(--surface); border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
    .book-item:active { border-color: var(--border); }
    .book-name { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .book-del { font-size: 0.85rem; color: var(--text-dim); padding: 0.3rem 0.5rem; }

    /* TOAST */
    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #2a1515; border: 1px solid #7a3030; color: #e87e7e; font-family: 'DM Mono', monospace; font-size: 0.73rem; padding: 0.75rem 1.25rem; border-radius: 10px; z-index: 999; max-width: 90vw; text-align: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; word-break: break-word; }
    #toast.show { opacity: 1; pointer-events: all; }

    /* READER */
    #reader { display: flex; flex-direction: column; }
    .reader-topbar { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
    .btn-icon { width: 36px; height: 36px; border-radius: 8px; border: none; background: var(--surface2); color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .btn-icon:active { background: var(--border); }
    .btn-icon.lit { background: var(--accent); color: var(--bg); }
    .book-title-bar { flex: 1; font-size: 0.78rem; color: var(--text-mid); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* RSVP */
    #rsvpMode { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 1rem; gap: 0.9rem; overflow: hidden; }
    .prog-wrap { width: 100%; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; transition: width 0.1s; }
    .rsvp-context { width: 100%; text-align: center; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text-dim); min-height: 2.2em; line-height: 1.6; padding: 0 0.5rem; }
    .rsvp-stage { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
    .rsvp-word { font-family: 'Playfair Display', serif; font-size: var(--rsvp-size); font-weight: 700; color: var(--text); text-align: center; line-height: 1.1; }
    .rsvp-word .pivot { color: var(--accent); }
    .rsvp-word.flash { animation: wf 0.07s ease-out; }
    @keyframes wf { 0% { opacity:0; transform:translateY(5px); } 100% { opacity:1; transform:translateY(0); } }
    .rsvp-controls { width: 100%; display: flex; flex-direction: column; gap: 0.7rem; }
    .speed-row { display: flex; align-items: center; gap: 0.75rem; }
    .speed-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--text-dim); white-space: nowrap; min-width: 50px; }
    .speed-val { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--accent); min-width: 56px; text-align: right; }
    input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; border-radius: 2px; background: var(--surface2); outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); cursor: pointer; }
    .status-row { display: flex; justify-content: space-between; }
    .pill { font-family: 'DM Mono', monospace; font-size: 0.63rem; padding: 0.25rem 0.6rem; border-radius: 20px; background: var(--surface2); color: var(--text-dim); }
    .pill.on { background: rgba(232,201,126,0.15); color: var(--accent); }
    .hold-btn { width: 100%; height: 72px; border-radius: 14px; border: 1.5px solid var(--border); background: linear-gradient(135deg, #252530, #1c1c28); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; touch-action: none; transition: border-color 0.1s, transform 0.1s; }
    .hold-btn.pressing { border-color: var(--accent); transform: scale(0.98); background: linear-gradient(135deg, #2a2a1e, #1e2218); }
    .hold-btn-icon { font-size: 1.3rem; }

    /* PROSE */
    #proseMode { flex: 1; overflow-y: auto; padding: 1.5rem 1.25rem; -webkit-overflow-scrolling: touch; }
    #proseContent { font-family: 'Playfair Display', serif; font-size: 1.05rem; line-height: 1.9; color: var(--text-mid); max-width: 640px; margin: 0 auto; }
    #proseContent p { margin-bottom: 1.2em; }
    #proseContent h1, #proseContent h2, #proseContent h3 { font-family: 'Playfair Display', serif; color: var(--text); margin: 1.4em 0 0.7em; }
    #proseContent h1 { font-size: 1.5rem; } #proseContent h2 { font-size: 1.25rem; } #proseContent h3 { font-size: 1.1rem; }

    /* LOADING */
    #loading { align-items: center; justify-content: center; gap: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.1em; }

    /* CHAPTER DRAWER */
    .chap-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .chap-overlay.open { opacity: 1; pointer-events: all; }
    .chap-sheet { width: 100%; background: var(--surface); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 1.25rem; max-height: 55vh; display: flex; flex-direction: column; gap: 0.75rem; transform: translateY(100%); transition: transform 0.25s; }
    .chap-overlay.open .chap-sheet { transform: translateY(0); }
    .chap-sheet-title { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }
    .chap-list { overflow-y: auto; display: flex; flex-direction: column; gap: 0.35rem; }
    .chap-item { padding: 0.65rem 0.85rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: var(--text-mid); transition: background 0.12s; border: 1px solid transparent; }
    .chap-item:active, .chap-item.active { background: var(--surface2); border-color: var(--border); color: var(--text); }
  </style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div>
    <div class="logo-title">FlowRead</div>
    <div class="logo-sub">RSVP · epub reader</div>
  </div>
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📖</div>
    <div class="drop-title">Open an EPUB</div>
    <div class="drop-hint">tap to browse · or drag &amp; drop</div>
  </div>
  <input type="file" id="fileInput" accept=".epub" />
  <div class="library" id="library" style="display:none">
    <div class="library-title">Recent Books</div>
    <div class="book-list" id="bookList"></div>
  </div>
</div>

<!-- LOADING -->
<div class="screen hidden" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Parsing epub…</div>
</div>

<!-- READER -->
<div class="screen hidden" id="reader">
  <div class="reader-topbar">
    <button class="btn-icon" id="backBtn">&#8592;</button>
    <div class="book-title-bar" id="bookTitleBar">—</div>
    <button class="btn-icon" id="chapBtn">&#9776;</button>
    <button class="btn-icon lit" id="modeBtn">&#9889;</button>
  </div>

  <!-- RSVP MODE -->
  <div id="rsvpMode">
    <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
    <div class="rsvp-context" id="rsvpCtx">—</div>
    <div class="rsvp-stage">
      <div class="rsvp-word" id="rsvpWord">open a book</div>
    </div>
    <div class="rsvp-controls">
      <div class="speed-row">
        <span class="speed-label">Speed</span>
        <input type="range" id="speedSlider" min="60" max="900" step="10" value="300" />
        <span class="speed-val" id="speedVal">300 wpm</span>
      </div>
      <div class="status-row">
        <span class="pill" id="statusPill">paused</span>
        <span class="pill" id="posPill">0 / 0</span>
      </div>
      <button class="hold-btn" id="holdBtn">
        <span class="hold-btn-icon">&#128065;</span>
        <span>Hold to Read</span>
      </button>
    </div>
  </div>

  <!-- PROSE MODE -->
  <div id="proseMode" style="display:none">
    <div id="proseContent"></div>
  </div>

  <!-- Chapter drawer -->
  <div class="chap-overlay" id="chapOverlay">
    <div class="chap-sheet">
      <div class="chap-sheet-title">Chapters</div>
      <div class="chap-list" id="chapList"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');

let toastTimer;
function toast(msg, dur) {
  dur = dur || 7000;
  var el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, dur);
}

function escH(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pivotIdx(w){
  var l=w.length;
  if(l<=1)return 0; if(l<=5)return 1; if(l<=9)return 2; return 3;
}

function renderWord(word){
  var el=$('rsvpWord');
  var p=pivotIdx(word);
  var before=word.slice(0,p), piv=word[p]||'', after=word.slice(p+1);
  el.innerHTML=escH(before)+'<span class="pivot">'+escH(piv)+'</span>'+escH(after);
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function stripToText(html){
  var d=document.createElement('div');
  d.innerHTML=html;
  d.querySelectorAll('script,style').forEach(function(e){e.remove();});
  d.querySelectorAll('p,div,br,h1,h2,h3,h4,h5,li').forEach(function(e){
    e.insertAdjacentText('afterend',' ');
  });
  return d.textContent||'';
}

function tokenize(txt){
  return txt.split(/\s+/).map(function(w){return w.trim();}).filter(function(w){return w.length>0;});
}

function cleanHtml(html){
  var d=document.createElement('div');
  d.innerHTML=html;
  d.querySelectorAll('script,style,link,meta').forEach(function(e){e.remove();});
  return d.innerHTML;
}

// STATE
var S={
  zip:null, opfBase:'', chapters:[], currentCh:0,
  words:[], wi:0, wpm:300, running:false, timer:null,
  mode:'rsvp', bookName:''
};

// EPUB PARSER
async function openEpubBuffer(buf, name){
  S.bookName=name;
  $('loadingText').textContent='Unzipping…';
  show('loading'); hide('home');

  try{ S.zip=await JSZip.loadAsync(buf); }
  catch(e){ hide('loading'); show('home'); toast('Unzip failed: '+e.message); return; }

  // container.xml
  $('loadingText').textContent='Reading structure…';
  var opfPath;
  try{
    var containerFile=S.zip.file('META-INF/container.xml');
    if(!containerFile) throw new Error('META-INF/container.xml not found');
    var containerText=await containerFile.async('text');
    var doc=new DOMParser().parseFromString(containerText,'application/xml');
    opfPath=doc.querySelector('rootfile') && doc.querySelector('rootfile').getAttribute('full-path');
    if(!opfPath) throw new Error('No rootfile found in container.xml');
  }catch(e){ hide('loading'); show('home'); toast('container.xml error: '+e.message); return; }

  S.opfBase=opfPath.includes('/') ? opfPath.substring(0,opfPath.lastIndexOf('/')+1) : '';

  // OPF
  var opfText;
  try{
    var opfFile=S.zip.file(opfPath);
    if(!opfFile) throw new Error('OPF not found at: '+opfPath);
    opfText=await opfFile.async('text');
  }catch(e){ hide('loading'); show('home'); toast('OPF error: '+e.message); return; }

  var opf=new DOMParser().parseFromString(opfText,'application/xml');

  // manifest
  var manifest={};
  opf.querySelectorAll('manifest item').forEach(function(item){
    manifest[item.getAttribute('id')]={
      href:item.getAttribute('href'),
      type:item.getAttribute('media-type')||''
    };
  });

  // spine
  var spineIds=[].slice.call(opf.querySelectorAll('spine itemref')).map(function(i){return i.getAttribute('idref');});
  if(spineIds.length===0){
    // fallback: all xhtml items
    Object.keys(manifest).forEach(function(id){
      if(manifest[id].type.includes('html')) spineIds.push(id);
    });
  }

  // NCX titles
  var tocTitles={};
  var ncxId=opf.querySelector('spine') && opf.querySelector('spine').getAttribute('toc');
  if(ncxId && manifest[ncxId]){
    try{
      var ncxFile=S.zip.file(S.opfBase+manifest[ncxId].href);
      if(ncxFile){
        var ncxText=await ncxFile.async('text');
        var ncx=new DOMParser().parseFromString(ncxText,'application/xml');
        ncx.querySelectorAll('navPoint').forEach(function(np){
          var src=np.querySelector('content') && np.querySelector('content').getAttribute('src');
          var label=np.querySelector('navLabel text') && np.querySelector('navLabel text').textContent.trim();
          if(src&&label){ var base=src.split('#')[0]; tocTitles[base]=label; }
        });
      }
    }catch(e){}
  }

  // build chapters
  S.chapters=[];
  spineIds.forEach(function(id,i){
    var item=manifest[id];
    if(!item) return;
    if(!item.type.includes('html') && !item.href.match(/\.(html|xhtml|htm)$/i)) return;
    var fullPath=S.opfBase+item.href;
    var hrefBase=item.href.split('#')[0];
    var title=tocTitles[hrefBase]||tocTitles[item.href]||('Section '+(i+1));
    S.chapters.push({title:title, href:item.href, fullPath:fullPath});
  });

  if(S.chapters.length===0){
    hide('loading'); show('home');
    toast('No HTML chapters found in this epub. Found '+spineIds.length+' spine items.');
    return;
  }

  var prog=loadProgress(name);
  S.currentCh=prog ? Math.min(prog.ch, S.chapters.length-1) : 0;
  S.wi=prog ? prog.wi : 0;

  $('bookTitleBar').textContent=name;
  renderChapterList();
  await loadChapter(S.currentCh, false);
  hide('loading'); show('reader');
}

async function loadChapter(idx, resetWi){
  if(resetWi===undefined) resetWi=true;
  if(!S.chapters[idx]) return;
  S.currentCh=idx;
  if(resetWi) S.wi=0;

  var ch=S.chapters[idx];
  var html='';
  try{
    var f=S.zip.file(ch.fullPath);
    if(!f){
      // try without opfBase
      f=S.zip.file(ch.href);
      if(!f) throw new Error('Not found: '+ch.fullPath);
    }
    html=await f.async('text');
  }catch(e){
    toast('Chapter load error: '+e.message);
    S.words=['[chapter','failed','to','load]'];
    S.wi=0;
    updateUI();
    return;
  }

  // Extract body
  var bodyMatch=html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  var bodyHtml=bodyMatch ? bodyMatch[1] : html;

  S.words=tokenize(stripToText(bodyHtml));
  if(S.wi>=S.words.length) S.wi=0;
  if(S.words.length===0) S.words=['[empty','chapter]'];

  $('proseContent').innerHTML=cleanHtml(bodyHtml);
  updateUI();
  updateChapterActive();
}

function updateUI(){
  renderWord(S.words[S.wi]||'—');
  updateCtx();
  updateProg();
}

function updateProg(){
  var pct=S.words.length ? (S.wi/S.words.length)*100 : 0;
  $('progFill').style.width=pct+'%';
  $('posPill').textContent=S.wi+' / '+S.words.length;
}

function updateCtx(){
  var before=S.words.slice(Math.max(0,S.wi-4),S.wi).join(' ');
  var after=S.words.slice(S.wi+1,S.wi+5).join(' ');
  $('rsvpCtx').textContent=(before?'… '+before+' ':'')+' [ ] '+(after?after+' …':'');
}

// RSVP ENGINE
function startRSVP(){
  if(S.running||S.words.length===0) return;
  S.running=true;
  $('statusPill').textContent='reading';
  $('statusPill').classList.add('on');
  $('holdBtn').classList.add('pressing');
  tick();
}

function stopRSVP(){
  if(!S.running) return;
  S.running=false;
  clearTimeout(S.timer);
  $('statusPill').textContent='paused';
  $('statusPill').classList.remove('on');
  $('holdBtn').classList.remove('pressing');
  saveProgress(S.bookName,S.currentCh,S.wi);
}

function tick(){
  if(!S.running) return;
  if(S.wi>=S.words.length){
    if(S.currentCh+1<S.chapters.length){
      loadChapter(S.currentCh+1,true).then(function(){ if(S.running) tick(); });
    } else {
      stopRSVP();
      renderWord('Done!');
      $('rsvpCtx').textContent='End of book';
    }
    return;
  }
  var word=S.words[S.wi];
  renderWord(word);
  updateCtx();
  S.wi++;
  updateProg();
  var base=60000/S.wpm;
  var extra=word.length>9 ? base*0.25 : 0;
  var pause=/[.!?]$/.test(word) ? base*0.7 : /[,;:]$/.test(word) ? base*0.3 : 0;
  S.timer=setTimeout(tick, base+extra+pause);
}

// SPEED
$('speedSlider').addEventListener('input', function(e){
  S.wpm=parseInt(e.target.value);
  $('speedVal').textContent=S.wpm+' wpm';
});

// HOLD BUTTON
var hb=$('holdBtn');
hb.addEventListener('touchstart',function(e){e.preventDefault();star
